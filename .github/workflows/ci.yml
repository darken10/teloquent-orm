name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:sqlite

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: teloquent
          POSTGRES_PASSWORD: teloquent
          POSTGRES_DB: teloquent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teloquent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:pg
        env:
          TELOQUENT_DIALECT: pgsql
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_USER: teloquent
          PG_PASSWORD: teloquent
          PG_DATABASE: teloquent

  mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: teloquent
          MYSQL_DATABASE: teloquent
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -pteloquent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:mysql
        env:
          TELOQUENT_DIALECT: mysql
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: teloquent
          MYSQL_DATABASE: teloquent
