# Bases de données pour tester Teloquent sur MySQL et PostgreSQL.
#   docker compose up -d      # démarre les deux
#   npm run test:pg           # tests sur PostgreSQL
#   npm run test:mysql        # tests sur MySQL
#   docker compose down -v    # arrête et nettoie
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: teloquent
      POSTGRES_PASSWORD: teloquent
      POSTGRES_DB: teloquent
    ports:
      - "5433:5432" # 5432 souvent déjà pris en local -> on expose sur 5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teloquent"]
      interval: 3s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: teloquent
      MYSQL_DATABASE: teloquent
    ports:
      - "3307:3306" # 3306 souvent déjà pris en local -> on expose sur 3307
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pteloquent"]
      interval: 3s
      timeout: 3s
      retries: 20
